name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: extractions/setup-just@v2
      - run: just build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: extractions/setup-just@v2
      - run: just test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  # Temporary qualifying-host gate for Rally lap then-bb63: runs the opt-in
  # real-systemd integration test on a hosted Ubuntu runner with a reachable
  # systemd --user manager. Removed after evidence is captured.
  real-systemd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Start a qualifying systemd user manager
        run: |
          set -e
          UID_NUM="$(id -u)"
          USER_NAME="$(id -un)"
          RUNTIME_DIR="/run/user/${UID_NUM}"
          sudo loginctl enable-linger "${USER_NAME}" || true
          sudo mkdir -p "${RUNTIME_DIR}"
          sudo chown "${UID_NUM}:${UID_NUM}" "${RUNTIME_DIR}"
          export XDG_RUNTIME_DIR="${RUNTIME_DIR}"
          echo "XDG_RUNTIME_DIR=${RUNTIME_DIR}" >> "$GITHUB_ENV"
          for _ in $(seq 1 30); do
            if systemctl --user show-environment >/dev/null 2>&1; then
              echo "user manager is reachable"
              systemctl --user show-environment
              exit 0
            fi
            sleep 1
          done
          echo "::error::systemd user manager did not become reachable"
          exit 1
      - name: Run real-systemd integration verification
        run: |
          THENN_SYSTEMD_INTEGRATION=1 go test -v -tags=integration ./internal/job -run TestRealSystemd
